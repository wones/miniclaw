<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miniclaw</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Miniclaw</h1>
            </div>
            
            <button class="new-chat-btn" id="newChatBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
                <span>新会话</span>
            </button>
            
            <div class="session-list" id="sessionList">
            </div>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <div class="chat-container">
                <header class="chat-header">
                    <div class="header-content">
                        <div class="logo">🤖</div>
                        <div class="header-info">
                            <h1 id="currentSessionTitle">新对话</h1>
                            <div class="status">
                                <span class="status-dot"></span>
                                <span>在线</span>
                            </div>
                        </div>
                    </div>
                    <button class="theme-toggle" id="themeToggle" title="切换主题">
                        <span class="theme-icon">🌙</span>
                    </button>
                </header>
                
                <div class="chat-messages" id="chatMessages">
                </div>
                
                <div class="chat-input">
                    <div class="emoji-panel" id="emojiPanel">
                        <div class="emoji-grid">
                            <span>😀</span><span>😃</span><span>😄</span><span>😁</span><span>😆</span><span>😅</span><span>🤣</span><span>😂</span><span>🙂</span><span>😊</span><span>😇</span><span>🥰</span>
                            <span>😍</span><span>🤩</span><span>😘</span><span>😗</span><span>😚</span><span>😋</span><span>🤤</span><span>❤️</span><span>🧡</span><span>💛</span><span>💚</span>
                            <span>💙</span><span>💜</span><span>🖤</span><span>🤍</span><span>🤎</span><span>👍</span><span>👎</span><span>👏</span><span>🙌</span><span>🎉</span><span>🎊</span>
                            <span>🔥</span><span>💯</span><span>✨</span><span>🌟</span><span>💪</span><span>🙏</span><span>🐶</span><span>🐱</span><span>🐭</span><span>🐹</span><span>🐰</span><span>🦊</span>
                            <span>🐻</span><span>🐼</span><span>🐨</span><span>🐯</span><span>🦁</span><span>🐮</span><span>🐷</span>
                        </div>
                    </div>
                    
                    <div class="input-tools">
                        <label class="tool-btn" for="fileInput">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </label>
                        <input type="file" id="fileInput" class="hidden" accept="image/*,.pdf,.doc,.docx,.txt">
                        
                        <button class="tool-btn emoji-trigger" id="emojiBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M8 15s1.5-2 4-2 4 2 4 2"></path>
                                <path d="M9 9h.01"></path>
                                <path d="M15 9h.01"></path>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="input-wrapper">
                        <input type="text" id="messageInput" placeholder="输入消息..." onkeydown="handleKeyDown(event)">
                        <button class="send-btn" onclick="sendMessage()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
